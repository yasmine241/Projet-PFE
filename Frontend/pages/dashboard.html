<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - SG SecureBank</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/dashboard.css">
</head>
<body>

<!-- 🚨 FRAUD ALERT -->
<div id="fraudAlert" class="alert alert-danger m-0" style="display:none;">
    🚨 Fraude détectée ! Vérifiez les transactions immédiatement.
</div>

<!-- NAVBAR -->
<div id="navbar"></div>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div id="sidebar"></div>

    <!-- CONTENT -->
    <div class="container p-4">
        <h1 class="mb-4">Dashboard</h1>

        <div class="row">

            <!-- TOTAL -->
            <div class="col-md-4">
                <div class="card text-white bg-primary mb-3">
                    <div class="card-body">
                        <h5>Total Transactions</h5>
                        <h3 id="totalTransactions">—</h3>
                    </div>
                </div>
            </div>

            <!-- FRAUD -->
            <div class="col-md-4">
                <div class="card text-white bg-danger mb-3">
                    <div class="card-body">
                        <h5>Fraudes</h5>
                        <h3 id="fraudCount">—</h3>
                    </div>
                </div>
            </div>

            <!-- SAFE -->
            <div class="col-md-4">
                <div class="card text-white bg-success mb-3">
                    <div class="card-body">
                        <h5>Transactions sûres</h5>
                        <h3 id="safeCount">—</h3>
                    </div>
                </div>
            </div>

        </div>
    </div>
</div>

<!-- SCRIPTS -->
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/dashboard.js"></script>

</body>
</html>
