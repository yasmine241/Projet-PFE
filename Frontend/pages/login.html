<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Login - FraudShield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-box { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        input { margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="login-box">
    <h2 class="mb-4 text-center d-flex align-items-center justify-content-center gap-2">
        <img src="../assets/logo.svg" alt="Logo" style="height:40px; width:auto;">
        FraudShield
    </h2>
    <form onsubmit="login(event)">
        <input type="email" id="email" class="form-control" placeholder="Email" required>
        <input type="password" id="password" class="form-control" placeholder="Mot de passe" required>
        <button type="submit" class="btn btn-primary w-100">Se connecter</button>
    </form>
</div>

<!-- config.js AVANT login.js -->
<script src="../assets/js/config.js"></script>
<script src="../assets/js/login.js"></script>

</body>
</html>
